<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Geometry Dash</title>

<style>
body{margin:0;background:black;overflow:hidden;}
canvas{display:block;}
#menu{text-align:center;color:white;padding-top:40px;}
button{padding:10px;margin:5px;border:none;border-radius:8px;}
#pauseBtn{position:fixed;top:10px;right:10px;}
#retry{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
display:none;
}
</style>
</head>

<body>

<div id="menu">
<h1 style="color:white;">Mini Geometry Dash</h1>
<button onclick="startGame()">JUGAR</button>
</div>

<button id="pauseBtn" onclick="togglePause()" style="display:none;">⏸</button>
<button id="retry" onclick="restart()">REINTENTAR</button>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);

let player,level=[],platforms=[],portals=[];
let cameraX,speed,alive,paused,startTime;
let jumpPressed=false;
let particles=[];

const HITBOX_SCALE=0.8;

// INPUT
window.addEventListener("mousedown",()=>jumpPressed=true);
window.addEventListener("touchstart",()=>jumpPressed=true);
window.addEventListener("keydown",e=>{
if(e.code==="Space") jumpPressed=true;
});

// TRIANGULO
function pointInTriangle(px,py, ax,ay, bx,by, cx,cy){
let area=(bx-ax)*(cy-ay)-(cx-ax)*(by-ay);
let s=((ay-cy)*(px-cx)+(cx-ax)*(py-cy))/area;
let t=((cy-by)*(px-cx)+(bx-cx)*(py-cy))/area;
return s>=0 && t>=0 && (s+t)<=1;
}

function collideTriangle(player,tri){
let size=player.size*HITBOX_SCALE;
let off=(player.size-size)/2;

let hb={x:player.x+off,y:player.y+off,size:size};

let pts=[
{x:hb.x,y:hb.y},
{x:hb.x+hb.size,y:hb.y},
{x:hb.x,y:hb.y+hb.size},
{x:hb.x+hb.size,y:hb.y+hb.size}
];

for(let p of pts){
if(pointInTriangle(p.x,p.y,tri.x1,tri.y1,tri.x2,tri.y2,tri.x3,tri.y3)){
return true;
}
}
return false;
}

// 🔥 DIFICULTAD CADA 15s
function getDifficulty(){
let t=(Date.now()-startTime)/1000;
return Math.floor(t/15);
}

// 🧱 GENERADOR
function generateObstacle(){

let diff=getDifficulty();

let lastX = level.length ? level[level.length-1].x : 1200;

// más difícil = menos espacio
let gap = 500 - diff*40;
if(gap<250) gap=250;

let height = 60 + Math.random()*40 + diff*5;

level.push({
x: lastX + gap,
h: height
});
}

// 🌈 PORTAL CON PLATAFORMA
function generatePortal(){

let lastX = level.length ? level[level.length-1].x : 2000;
let x = lastX + 800;

platforms.push({
x:x,
y:canvas.height-200,
w:200,
h:20
});

portals.push({
x:x+100,
y:canvas.height-230
});

// espacio seguro después
level.push({
x:x+600,
h:60
});
}

// INICIO
function startGame(){

cameraX=0;
speed=1;
alive=true;
paused=false;
particles=[];
level=[];
platforms=[];
portals=[];
startTime=Date.now();

document.getElementById("retry").style.display="none";
document.getElementById("menu").style.display="none";

resize();

player={
x:120,y:0,size:50,dy:0,
gravity:0.75,jump:-15,
grounded:false
};

// inicial
for(let i=0;i<8;i++) generateObstacle();
generatePortal();

game();
}

// LOOP
function game(){

if(paused){requestAnimationFrame(game);return;}

ctx.fillStyle="#111";
ctx.fillRect(0,0,canvas.width,canvas.height);

cameraX+=speed*5;

let ground=canvas.height-80;

// FISICA
player.dy+=player.gravity;

if(jumpPressed && player.grounded){
player.dy=player.jump;
jumpPressed=false;
}

player.y+=player.dy;

// suelo
if(player.y+player.size>=ground){
player.y=ground-player.size;
player.dy=0;
player.grounded=true;
}else{
player.grounded=false;
}

// PLATAFORMAS
platforms.forEach(p=>{
let x=p.x-cameraX;

ctx.fillStyle="cyan";
ctx.fillRect(x,p.y,p.w,p.h);

// colision arriba
if(player.x+player.size>x && player.x<x+p.w){
if(player.y+player.size>p.y && player.y+player.size<p.y+20){
player.y=p.y-player.size;
player.dy=0;
player.grounded=true;
}
}
});

// PORTALES
portals.forEach(p=>{
let x=p.x-cameraX;

ctx.shadowBlur=30;
ctx.strokeStyle="yellow";

ctx.beginPath();
ctx.arc(x,p.y,25,0,Math.PI*2);
ctx.stroke();

// entrar portal
if(player.x<x+25 && player.x+player.size>x-25){
cameraX+=400; // te adelanta
}
});

// PLAYER
if(alive){
ctx.shadowBlur=25;
ctx.shadowColor="#00ffff";
ctx.fillStyle="#00ffff";
ctx.fillRect(player.x,player.y,player.size,player.size);
}

// OBSTACULOS
level.forEach((obs,i)=>{
let x=obs.x-cameraX;
let y=ground-obs.h;

// limpiar y generar
if(x<-100){
level.splice(i,1);
generateObstacle();

// cada tanto portal nuevo
if(Math.random()<0.2) generatePortal();
}

// dibujo
ctx.shadowBlur=25;
ctx.shadowColor="#ff0066";
ctx.fillStyle="#ff0066";

ctx.beginPath();
ctx.moveTo(x,ground);
ctx.lineTo(x+40,y);
ctx.lineTo(x+80,ground);
ctx.fill();

let tri={x1:x,y1:ground,x2:x+40,y2:y,x3:x+80,y3:ground};

if(alive && collideTriangle(player,tri)){
alive=false;
explode(player.x,player.y);
setTimeout(()=>{document.getElementById("retry").style.display="block";},300);
}
});

requestAnimationFrame(game);
}

// EXPLOSION
function explode(x,y){
for(let i=0;i<50;i++){
particles.push({
x,y,
dx:(Math.random()-0.5)*8,
dy:(Math.random()-0.5)*8,
life:40
});
}
}

// REINICIAR
function restart(){
startGame();
}

// PAUSA
function togglePause(){
paused=!paused;
document.getElementById("pauseBtn").innerText=paused?"▶":"⏸";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Geometry Dash</title>

<style>
body{margin:0;background:black;color:white;font-family:Arial;overflow:hidden;}
canvas{display:block;}
#menu{text-align:center;padding-top:40px;}
button{padding:10px;margin:5px;border:none;border-radius:8px;font-size:16px;}
#pauseBtn{
position:fixed;top:10px;right:10px;
font-size:14px;padding:6px 10px;opacity:0.7;
}
#retry{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
display:none;font-size:20px;
}
</style>
</head>

<body>

<div id="menu">
<h1>Mini Geometry Dash</h1>
<button onclick="startGame()">JUGAR</button>
</div>

<button id="pauseBtn" onclick="togglePause()" style="display:none;">⏸</button>
<button id="retry" onclick="restart()">REINTENTAR</button>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);

// VARIABLES
let player,level;
let cameraX,speed,startTime,alive,paused;

// INICIO
function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
document.getElementById("pauseBtn").style.display="block";

resize();

player={
x:120,y:0,size:50,dy:0,
gravity:0.8,jump:-16,
grounded:false,rotation:0
};

cameraX=0;
speed=1.1;
alive=true;
paused=false;
startTime=Date.now();

// NIVEL (mejor separación)
level=[
{x:600,h:60},{x:1100,h:80},{x:1700,h:70},
{x:2400,h:100},{x:3100,h:80},{x:3800,h:120},
{x:4500,h:70},{x:5200,h:90}
];

game();
}

// INPUT
window.addEventListener("click",jump);
window.addEventListener("keydown",e=>{
if(e.code==="Space") jump();
});

function jump(){
if(!alive||paused) return;

// SOLO SALTA SI ESTA EN EL PISO
if(player.grounded){
player.dy=player.jump;
player.grounded=false;
}
}

// LOOP
function game(){

if(paused){requestAnimationFrame(game);return;}

// FONDO NEON
let g=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
g.addColorStop(0,"#0f2027");
g.addColorStop(1,"#2c5364");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

// VELOCIDAD PROGRESIVA (CORREGIDA)
let elapsed=(Date.now()-startTime)/1000;
speed=1.1 + Math.floor(elapsed/10)*0.1;

cameraX+=speed*6;

let ground=canvas.height-80;

// FISICA
player.dy+=player.gravity;
player.y+=player.dy;

if(player.y+player.size>=ground){
player.y=ground-player.size;
player.dy=0;
player.grounded=true;
player.rotation=0;
}else{
player.rotation+=0.15;
}

// TRAIL NEON
ctx.shadowBlur=20;
ctx.shadowColor="#00ffff";
ctx.fillStyle="rgba(0,255,255,0.3)";
ctx.fillRect(player.x-10,player.y-10,player.size,player.size);

// PLAYER
ctx.save();
ctx.translate(player.x,player.y);
ctx.rotate(player.rotation);

ctx.shadowBlur=25;
ctx.shadowColor="#00ffff";
ctx.fillStyle="#00ffff";
ctx.fillRect(-player.size/2,-player.size/2,player.size,player.size);

ctx.restore();

// OBSTACULOS (NO DESAPARECEN)
level.forEach(obs=>{
let x=obs.x-cameraX;

ctx.fillStyle="#ff0066";
ctx.shadowBlur=20;
ctx.shadowColor="#ff0066";

ctx.beginPath();
ctx.moveTo(x,ground);
ctx.lineTo(x+40,ground-obs.h);
ctx.lineTo(x+80,ground);
ctx.fill();

// COLISION
if(
player.x<x+80 &&
player.x+player.size>x &&
player.y<ground &&
player.y+player.size>ground-obs.h
){
endGame();
}
});

// UI
ctx.fillStyle="white";
ctx.shadowBlur=0;
ctx.fillText("Speed: "+speed.toFixed(1),20,40);

if(alive) requestAnimationFrame(game);
}

// FIN
function endGame(){
alive=false;
document.getElementById("retry").style.display="block";
}

// REINICIAR
function restart(){
document.getElementById("retry").style.display="none";
startGame();
}

// PAUSA
function togglePause(){
paused=!paused;
document.getElementById("pauseBtn").innerText=paused?"▶":"⏸";
}
</script>

</body>
</html>

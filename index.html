<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Geometry Dash</title>

<style>
body{margin:0;background:black;overflow:hidden;}
canvas{display:block;}
#menu{text-align:center;color:white;padding-top:40px;}
button{padding:10px;margin:5px;border:none;border-radius:8px;}
#pauseBtn{position:fixed;top:10px;right:10px;}
#retry{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
display:none;
}
</style>
</head>

<body>

<div id="menu">
<h1 style="color:white;">Mini Geometry Dash</h1>
<button onclick="startGame()">JUGAR</button>
</div>

<button id="pauseBtn" onclick="togglePause()" style="display:none;">⏸</button>
<button id="retry" onclick="restart()">REINTENTAR</button>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);

let player,level;
let cameraX,speed,alive,paused;
let gravityDir=1;
let jumpPressed=false;
let particles=[];

const HITBOX_SCALE=0.8;

// NIVEL
function createLevel(){
let lvl=[];
let x=1400;

for(let i=0;i<3;i++){lvl.push({x:x,h:60}); x+=800;}
for(let i=0;i<5;i++){lvl.push({x:x,h:70}); x+=500;}
for(let i=0;i<6;i++){lvl.push({x:x,h:100}); x+=300;}

return lvl;
}

// INPUT CORRECTO
window.addEventListener("mousedown",()=>jumpPressed=true);
window.addEventListener("touchstart",()=>jumpPressed=true);
window.addEventListener("keydown",e=>{
if(e.code==="Space") jumpPressed=true;
});

// TRIANGULO
function pointInTriangle(px,py, ax,ay, bx,by, cx,cy){
let area=(bx-ax)*(cy-ay)-(cx-ax)*(by-ay);
let s=((ay-cy)*(px-cx)+(cx-ax)*(py-cy))/area;
let t=((cy-by)*(px-cx)+(bx-cx)*(py-cy))/area;
return s>=0 && t>=0 && (s+t)<=1;
}

function getHitbox(p){
let size=p.size*HITBOX_SCALE;
let offset=(p.size-size)/2;
return {x:p.x+offset,y:p.y+offset,size:size};
}

function collideTriangle(player,tri){
let hb=getHitbox(player);

let pts=[
{x:hb.x,y:hb.y},
{x:hb.x+hb.size,y:hb.y},
{x:hb.x,y:hb.y+hb.size},
{x:hb.x+hb.size,y:hb.y+hb.size}
];

for(let p of pts){
if(pointInTriangle(p.x,p.y,tri.x1,tri.y1,tri.x2,tri.y2,tri.x3,tri.y3)){
return true;
}
}
return false;
}

// INICIO
function startGame(){

cameraX=0;
speed=1;
alive=true;
paused=false;
particles=[];
gravityDir=1;

document.getElementById("retry").style.display="none";
document.getElementById("menu").style.display="none";

resize();

player={
x:120,y:0,size:50,dy:0,
gravity:0.75,jump:-15,
grounded:false,rotation:0
};

level=createLevel();

game();
}

// LOOP
function game(){

if(paused){requestAnimationFrame(game);return;}

ctx.fillStyle="#111";
ctx.fillRect(0,0,canvas.width,canvas.height);

// velocidad fija por zona
if(cameraX<3000) speed=1;
else if(cameraX<6000) speed=1.08;
else speed=1.15;

cameraX+=speed*5;

let ground=canvas.height-80;

// 🔥 SALTO CORREGIDO
player.dy+=player.gravity;

if(jumpPressed && player.grounded){
player.dy=player.jump;
jumpPressed=false; // CLAVE
}

player.y+=player.dy;

if(player.y+player.size>=ground){
player.y=ground-player.size;
player.dy=0;
player.grounded=true;
}else{
player.grounded=false;
}

// PLAYER
if(alive){
ctx.fillStyle="#00ffff";
ctx.fillRect(player.x,player.y,player.size,player.size);
}

// OBSTACULOS
level.forEach(obs=>{
let x=obs.x-cameraX;
let y=ground-obs.h;

ctx.fillStyle="#ff0066";
ctx.beginPath();
ctx.moveTo(x,ground);
ctx.lineTo(x+40,y);
ctx.lineTo(x+80,ground);
ctx.fill();

let tri={x1:x,y1:ground,x2:x+40,y2:y,x3:x+80,y3:ground};

if(alive && collideTriangle(player,tri)){
alive=false;
explode(player.x,player.y);
setTimeout(()=>{document.getElementById("retry").style.display="block";},300);
}
});

// PARTICULAS
particles.forEach((p,i)=>{
p.x+=p.dx;
p.y+=p.dy;
p.life--;
ctx.fillStyle="cyan";
ctx.fillRect(p.x,p.y,3,3);
if(p.life<=0) particles.splice(i,1);
});

requestAnimationFrame(game);
}

// EXPLOSION
function explode(x,y){
for(let i=0;i<60;i++){
particles.push({
x,y,
dx:(Math.random()-0.5)*10,
dy:(Math.random()-0.5)*10,
life:40
});
}
}

// REINICIAR
function restart(){
startGame();
}

// PAUSA
function togglePause(){
paused=!paused;
document.getElementById("pauseBtn").innerText=paused?"▶":"⏸";
}
</script>

</body>
</html>

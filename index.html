<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Geometry Dash</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center;}
button{padding:10px;margin:5px;border:none;border-radius:8px;font-size:16px;}
canvas{display:none;}
#menu{padding-top:40px;}
#pauseBtn{
position:fixed;
top:10px;
right:10px;
font-size:14px;
padding:6px 10px;
opacity:0.7;
}
#retry{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
}
</style>
</head>

<body>

<div id="menu">
<h1>Mini Geometry Dash</h1>

<h2>Skins</h2>
<button onclick="setSkin('cyan')">Cyan</button>
<button onclick="setSkin('red')">Rojo</button>
<button onclick="setSkin('yellow')">Amarillo</button>

<h2>Niveles</h2>
<button onclick="startGame('normal')">Nivel Normal</button>
<button onclick="startGame('ia')">Nivel IA</button>

<h2>Ranking</h2>
<div id="ranking"></div>
</div>

<button id="pauseBtn" onclick="togglePause()" style="display:none;">⏸</button>
<button id="retry" onclick="restart()">REINTENTAR</button>

<canvas id="game"></canvas>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");
let music=document.getElementById("music");

let skin="cyan";
let coins=parseInt(localStorage.getItem("coins")||0);

let player,level,portals;
let cameraX,speed,gravityDir,alive,paused,startTime;

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);

// SKIN
function setSkin(s){skin=s;}

// INICIO
function startGame(type){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
document.getElementById("pauseBtn").style.display="block";

resize();

player={x:120,y:0,size:50,dy:0,gravity:0.8,jump:-16,grounded:false,rotation:0,mode:"cube"};
gravityDir=1;
cameraX=0;
speed=1.1;
alive=true;
paused=false;
startTime=Date.now();

// NIVEL NORMAL
level=[
{x:600,h:60},{x:1000,h:80},{x:1500,h:70},
{x:2000,h:100},{x:2600,h:80},{x:3200,h:120}
];

// NIVEL IA (random inteligente)
if(type==="ia"){
level=[];
let x=600;
for(let i=0;i<20;i++){
level.push({x:x,h:50+Math.random()*100});
x+=400+Math.random()*200;
}
}

portals=[
{x:1200,type:"gravity"},
{x:2000,type:"fly"},
{x:2600,type:"cube"}
];

music.currentTime=0;
music.play();

game();
}

// INPUT
window.addEventListener("click",jump);
window.addEventListener("keydown",e=>{if(e.code==="Space")jump();});

function jump(){
if(!alive||paused)return;

if(player.mode==="cube"){
if(player.grounded) player.dy=player.jump*gravityDir;
}else{
player.dy=-10;
}
}

// LOOP
function game(){

if(paused){requestAnimationFrame(game);return;}

ctx.fillStyle="#111";
ctx.fillRect(0,0,canvas.width,canvas.height);

let ground=canvas.height-80;

// VELOCIDAD PROGRESIVA
let elapsed=(Date.now()-startTime)/1000;
speed=1.1 + Math.floor(elapsed/10)*0.1;

cameraX+=speed*5;

// FISICA
if(player.mode==="cube"){
player.dy+=player.gravity*gravityDir;
}else{
player.dy+=0.5;
}
player.y+=player.dy;

if(gravityDir===1){
if(player.y+player.size>=ground){
player.y=ground-player.size;
player.dy=0;
player.grounded=true;
player.rotation=0;
}else{
player.rotation+=0.1;
}
}else{
if(player.y<=0){
player.y=0;
player.dy=0;
player.grounded=true;
player.rotation=0;
}else{
player.rotation+=0.1;
}
}

// COLOR
let color=skin==="cyan"?"#00ffff":skin==="red"?"#ff4444":"#ffff00";

// PLAYER
ctx.save();
ctx.translate(player.x,player.y);
ctx.rotate(player.rotation);
ctx.fillStyle=color;
ctx.fillRect(-player.size/2,-player.size/2,player.size,player.size);
ctx.restore();

// OBSTACULOS
level.forEach(obs=>{
let x=obs.x-cameraX;

ctx.fillStyle="#ff0066";
ctx.beginPath();
ctx.moveTo(x,ground);
ctx.lineTo(x+40,ground-obs.h);
ctx.lineTo(x+80,ground);
ctx.fill();

if(
player.x<x+80 &&
player.x+player.size>x &&
player.y<ground &&
player.y+player.size>ground-obs.h
){
endGame();
}
});

// PORTALES
portals.forEach(p=>{
let x=p.x-cameraX;

ctx.strokeStyle=p.type==="gravity"?"yellow":p.type==="fly"?"lime":"cyan";
ctx.beginPath();
ctx.arc(x,canvas.height/2,30,0,Math.PI*2);
ctx.stroke();

if(player.x<x+30 && player.x+player.size>x-30){
if(p.type==="gravity") gravityDir*=-1;
if(p.type==="fly") player.mode="fly";
if(p.type==="cube") player.mode="cube";
}
});

// UI
ctx.fillStyle="white";
ctx.fillText("Speed: "+speed.toFixed(1),20,40);

if(alive) requestAnimationFrame(game);
}

// FIN
function endGame(){
alive=false;
saveScore(Math.floor(cameraX/10));
document.getElementById("retry").style.display="block";
}

// REINICIAR
function restart(){
document.getElementById("retry").style.display="none";
startGame("normal");
}

// PAUSA
function togglePause(){
paused=!paused;
document.getElementById("pauseBtn").innerText=paused?"▶":"⏸";
}

// RANKING (BASE PARA ONLINE)
function saveScore(score){
let r=JSON.parse(localStorage.getItem("ranking")||"[]");
r.push(score);
r.sort((a,b)=>b-a);
r=r.slice(0,5);
localStorage.setItem("ranking",JSON.stringify(r));
showRanking();
}

function showRanking(){
let r=JSON.parse(localStorage.getItem("ranking")||"[]");
document.getElementById("ranking").innerHTML=
r.map(s=>"<div>"+s+"</div>").join("");
}

showRanking();
</script>

</body>
</html>

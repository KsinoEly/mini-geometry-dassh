<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Geometry Dash</title>

<style>
body{margin:0;background:black;font-family:Arial;}
canvas{display:none;}
#menu,#skinsMenu,#pauseMenu{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
color:white;
}
button{
padding:12px 20px;margin:8px;
border:none;border-radius:8px;
font-size:16px;cursor:pointer;
}
#pauseBtn{position:fixed;top:10px;right:10px;display:none;}
#menuBtn{position:fixed;top:10px;left:10px;display:none;}
.skin{
width:40px;height:40px;margin:5px;
display:inline-block;cursor:pointer;
border:2px solid white;
}
</style>
</head>

<body>

<div id="menu">
<h1>Mini Geometry Dash</h1>
<button onclick="startGame()">JUGAR</button>
<button onclick="openSkins()">SKINS</button>
</div>

<div id="skinsMenu" style="display:none;">
<h2>Elegir Skin</h2>
<div id="skins"></div>
<button onclick="backToMenu()">VOLVER</button>
</div>

<div id="pauseMenu" style="display:none;">
<h2>PAUSA</h2>
<button onclick="resume()">REANUDAR</button>
<button onclick="goMenu()">MENÚ</button>
</div>

<button id="pauseBtn" onclick="pauseGame()">⏸</button>
<button id="menuBtn" onclick="goMenu()">🏠</button>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);

// VARIABLES
let player,level=[],cameraX=0,speed=1;
let alive=true,paused=false;
let jumpPressed=false;
let skinColor="#00ffff";
let particles=[];
let music=new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=arcade-113449.mp3");
music.loop=true;

// HITBOX
const HITBOX_SCALE=0.8;

// RITMO
let pattern=[500,500,300,700,300,300,600,400];
let patternIndex=0;

// SKINS
const skinList=["#00ffff","#ff0066","#00ff00","#ffff00","#ff9900"];
const skinsDiv=document.getElementById("skins");

skinList.forEach(color=>{
let d=document.createElement("div");
d.className="skin";
d.style.background=color;
d.onclick=()=>{skinColor=color;}
skinsDiv.appendChild(d);
});

// INPUT
window.addEventListener("mousedown",()=>jumpPressed=true);
window.addEventListener("touchstart",()=>jumpPressed=true);
window.addEventListener("keydown",e=>{
if(e.code==="Space") jumpPressed=true;
});

// MENUS
function openSkins(){
menu.style.display="none";
skinsMenu.style.display="flex";
}
function backToMenu(){
skinsMenu.style.display="none";
menu.style.display="flex";
}
function goMenu(){
paused=false;
canvas.style.display="none";
pauseMenu.style.display="none";
menu.style.display="flex";
pauseBtn.style.display="none";
menuBtn.style.display="none";
music.pause();
}
function pauseGame(){
paused=true;
pauseMenu.style.display="flex";
}
function resume(){
paused=false;
pauseMenu.style.display="none";
}

// TRIANGULO
function pointInTriangle(px,py, ax,ay, bx,by, cx,cy){
let area=(bx-ax)*(cy-ay)-(cx-ax)*(by-ay);
let s=((ay-cy)*(px-cx)+(cx-ax)*(py-cy))/area;
let t=((cy-by)*(px-cx)+(bx-cx)*(py-cy))/area;
return s>=0 && t>=0 && (s+t)<=1;
}

// COLISION
function collideTriangle(player,tri){
let size=player.size*HITBOX_SCALE;
let off=(player.size-size)/2;

let hb={x:player.x+off,y:player.y+off,size:size};

let pts=[
{x:hb.x,y:hb.y},
{x:hb.x+hb.size,y:hb.y},
{x:hb.x,y:hb.y+hb.size},
{x:hb.x+hb.size,y:hb.y+hb.size}
];

for(let p of pts){
if(pointInTriangle(p.x,p.y,tri.x1,tri.y1,tri.x2,tri.y2,tri.x3,tri.y3)){
return true;
}
}
return false;
}

// EXPLOSION
function explode(x,y){
for(let i=0;i<80;i++){
particles.push({
x:x,y:y,
dx:(Math.random()-0.5)*10,
dy:(Math.random()-0.5)*10,
life:40
});
}
}

// INICIO
function startGame(){

menu.style.display="none";
canvas.style.display="block";
pauseBtn.style.display="block";
menuBtn.style.display="block";

resize();

player={
x:120,y:0,size:50,dy:0,
gravity:0.75,jump:-15,
grounded:false,rotation:0
};

cameraX=0;
level=[];
alive=true;
particles=[];
patternIndex=0;

let x=1200;
for(let i=0;i<25;i++){
x+=pattern[patternIndex%pattern.length];
patternIndex++;

level.push({x:x,h:60+(i%3)*20});
}

music.currentTime=0;
music.play();

game();
}

// LOOP
function game(){

if(paused){requestAnimationFrame(game);return;}

ctx.fillStyle="#111";
ctx.fillRect(0,0,canvas.width,canvas.height);

cameraX+=speed*5;

let ground=canvas.height-80;

// FISICA
player.dy+=player.gravity;

if(jumpPressed && player.grounded){
player.dy=player.jump;
jumpPressed=false;
}

player.y+=player.dy;

if(player.y+player.size>=ground){
player.y=ground-player.size;
player.dy=0;
player.grounded=true;
player.rotation=0;
}else{
player.grounded=false;
player.rotation+=0.15;
}

// PLAYER
if(alive){
ctx.save();
ctx.translate(player.x+25,player.y+25);
ctx.rotate(player.rotation);

ctx.shadowBlur=25;
ctx.shadowColor=skinColor;
ctx.fillStyle=skinColor;
ctx.fillRect(-25,-25,50,50);

ctx.restore();
}

// OBSTACULOS
level.forEach(obs=>{
let x=obs.x-cameraX;
let y=ground-obs.h;

ctx.shadowBlur=25;
ctx.shadowColor="#ff0066";
ctx.fillStyle="#ff0066";

ctx.beginPath();
ctx.moveTo(x,ground);
ctx.lineTo(x+40,y);
ctx.lineTo(x+80,ground);
ctx.fill();

let tri={x1:x,y1:ground,x2:x+40,y2:y,x3:x+80,y3:ground};

if(alive && collideTriangle(player,tri)){
alive=false;
explode(player.x+25,player.y+25);
music.pause();
pauseBtn.style.display="none";
menuBtn.style.display="none";
}
});

// PARTICULAS
particles.forEach((p,i)=>{
p.x+=p.dx;
p.y+=p.dy;
p.life--;

ctx.fillStyle="white";
ctx.fillRect(p.x,p.y,3,3);

if(p.life<=0) particles.splice(i,1);
});

requestAnimationFrame(game);
}
</script>

</body>
</html>

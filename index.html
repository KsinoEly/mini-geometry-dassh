<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Geometry Dash</title>

<style>
body{margin:0;background:black;font-family:Arial;}
canvas{display:none;}

#menu,#skinsMenu,#pauseMenu,#gameOver{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
color:white;
}

button{
padding:12px 20px;margin:8px;
border:none;border-radius:8px;
font-size:16px;cursor:pointer;
}

#pauseBtn{position:fixed;top:10px;right:10px;display:none;}
#menuBtn{position:fixed;top:10px;left:10px;display:none;}

.skin{
width:40px;height:40px;margin:5px;
display:inline-block;cursor:pointer;
border:2px solid white;
}

#gameOver{display:none;font-size:30px;}
</style>
</head>

<body>

<div id="menu">
<h1>Mini Geometry Dash</h1>
<button onclick="startGame()">JUGAR</button>
<button onclick="openSkins()">SKINS</button>
</div>

<div id="skinsMenu" style="display:none;">
<h2>Elegir Skin</h2>
<div id="skins"></div>
<button onclick="backToMenu()">VOLVER</button>
</div>

<div id="pauseMenu" style="display:none;">
<h2>PAUSA</h2>
<button onclick="resume()">REANUDAR</button>
<button onclick="goMenu()">MENÚ</button>
</div>

<div id="gameOver">
<h1>GAME OVER</h1>
<button onclick="startGame()">REINTENTAR</button>
</div>

<button id="pauseBtn" onclick="pauseGame()">⏸</button>
<button id="menuBtn" onclick="goMenu()">🏠</button>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);

let player,level=[],cameraX=0,speed=1;
let alive=true,paused=false;
let jumpPressed=false;
let skinColor="#00ffff";
let particles=[];

// SKINS
const skinList=["#00ffff","#ff0066","#00ff00","#ffff00","#ff9900","#ff0000"];
const skinsDiv=document.getElementById("skins");

skinList.forEach(color=>{
let d=document.createElement("div");
d.className="skin";
d.style.background=color;
d.onclick=()=>skinColor=color;
skinsDiv.appendChild(d);
});

// INPUT
window.addEventListener("mousedown",()=>jumpPressed=true);
window.addEventListener("touchstart",()=>jumpPressed=true);
window.addEventListener("keydown",e=>{
if(e.code==="Space") jumpPressed=true;
});

// MENUS
function openSkins(){menu.style.display="none";skinsMenu.style.display="flex";}
function backToMenu(){skinsMenu.style.display="none";menu.style.display="flex";}
function goMenu(){
paused=false;
canvas.style.display="none";
pauseMenu.style.display="none";
gameOver.style.display="none";
menu.style.display="flex";
pauseBtn.style.display="none";
menuBtn.style.display="none";
}
function pauseGame(){paused=true;pauseMenu.style.display="flex";}
function resume(){paused=false;pauseMenu.style.display="none";}

// 💥 EXPLOSION CUADRADOS
function explode(x,y){
for(let i=0;i<80;i++){
particles.push({
x:x,y:y,
dx:(Math.random()-0.5)*12,
dy:(Math.random()-0.5)*12,
life:50,
size:4+Math.random()*4
});
}
}

// COLISION
function collide(player,x,y){
let px=player.x, py=player.y, s=player.size;

if(px+s < x || px > x+80) return false;
if(py+s >= y && px+s > x && px < x+80) return true;

return false;
}

// INICIO
function startGame(){

menu.style.display="none";
gameOver.style.display="none";
canvas.style.display="block";
pauseBtn.style.display="block";
menuBtn.style.display="block";

resize();

player={x:120,y:0,size:50,dy:0,gravity:0.75,jump:-15,grounded:false,rotation:0};

cameraX=0;
level=[];
alive=true;
particles=[];

for(let i=0;i<20;i++){
level.push({x:1200+i*400,h:60+Math.random()*40});
}

game();
}

// LOOP
function game(){

if(paused){requestAnimationFrame(game);return;}

ctx.fillStyle="#111";
ctx.fillRect(0,0,canvas.width,canvas.height);

cameraX+=speed*5;

let ground=canvas.height-80;

// FISICA
player.dy+=player.gravity;

if(jumpPressed && player.grounded){
player.dy=player.jump;
jumpPressed=false;
}

player.y+=player.dy;

if(player.y+player.size>=ground){
player.y=ground-player.size;
player.dy=0;
player.grounded=true;
player.rotation=0;
}else{
player.grounded=false;
player.rotation+=0.15;
}

// PLAYER
if(alive){
ctx.save();
ctx.translate(player.x+25,player.y+25);
ctx.rotate(player.rotation);

ctx.shadowBlur=30;
ctx.shadowColor=skinColor;
ctx.fillStyle=skinColor;
ctx.fillRect(-25,-25,50,50);

ctx.restore();
}

// OBSTACULOS
level.forEach(obs=>{
let x=obs.x-cameraX;
let y=ground-obs.h;

ctx.shadowBlur=25;
ctx.shadowColor="#ff0066";
ctx.fillStyle="#ff0066";

ctx.beginPath();
ctx.moveTo(x,ground);
ctx.lineTo(x+40,y);
ctx.lineTo(x+80,ground);
ctx.fill();

// 💀 MUERTE
if(alive && collide(player,x,y)){
alive=false;
explode(player.x+25,player.y+25);
pauseBtn.style.display="none";
menuBtn.style.display="none";

// mostrar game over
setTimeout(()=>{
gameOver.style.display="flex";
},400);
}
});

// 💥 PARTICULAS
particles.forEach((p,i)=>{
p.x+=p.dx;
p.y+=p.dy;
p.life--;

ctx.shadowBlur=20;
ctx.shadowColor=skinColor;
ctx.fillStyle=skinColor;
ctx.fillRect(p.x,p.y,p.size,p.size);

if(p.life<=0) particles.splice(i,1);
});

requestAnimationFrame(game);
}
</script>

</body>
</html>

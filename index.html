<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Geometry Dash</title>

<style>
body{margin:0;background:black;overflow:hidden;font-family:Arial;}
canvas{display:block;}
#menu{text-align:center;color:white;padding-top:40px;}
button{padding:10px;margin:5px;border:none;border-radius:8px;}
#pauseBtn{position:fixed;top:10px;right:10px;}
#retry{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
display:none;font-size:20px;
}
</style>
</head>

<body>

<div id="menu">
<h1 style="color:white;">Mini Geometry Dash</h1>
<button onclick="startGame()">JUGAR</button>
</div>

<button id="pauseBtn" onclick="togglePause()" style="display:none;">⏸</button>
<button id="retry" onclick="restart()">REINTENTAR</button>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);

// VARIABLES
let player,level,portals;
let cameraX,speed,startTime,alive,paused;
let particles=[];
let gravityDir=1;
let holding=false;

// PATRONES REALES
function createLevel(){
let lvl=[];
let x=1200;

// patrón simple
for(let i=0;i<3;i++){
lvl.push({x:x,h:60});
x+=700;
}

// patrón doble salto
lvl.push({x:x,h:80});
x+=300;
lvl.push({x:x,h:80});
x+=700;

// patrón rápido
for(let i=0;i<5;i++){
lvl.push({x:x,h:70});
x+=350;
}

// patrón difícil
for(let i=0;i<6;i++){
lvl.push({x:x,h:90});
x+=300;
}

return lvl;
}

// INICIO
function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
document.getElementById("pauseBtn").style.display="block";

resize();

player={
x:120,y:0,size:50,dy:0,
gravity:0.8,jump:-16,
grounded:false,rotation:0,
mode:"cube"
};

cameraX=0;
speed=0.8;
alive=true;
paused=false;
startTime=Date.now();
gravityDir=1;

level=createLevel();

portals=[
{x:3000,type:"gravity"},
{x:4500,type:"ship"},
{x:7000,type:"gravity"},
{x:8500,type:"cube"}
];

particles=[];

game();
}

// INPUT
window.addEventListener("mousedown",()=>holding=true);
window.addEventListener("mouseup",()=>holding=false);
window.addEventListener("touchstart",()=>holding=true);
window.addEventListener("touchend",()=>holding=false);
window.addEventListener("keydown",e=>{
if(e.code==="Space") holding=true;
});
window.addEventListener("keyup",e=>{
if(e.code==="Space") holding=false;
});

// LOOP
function game(){

if(paused){requestAnimationFrame(game);return;}

// FONDO PRO
let g=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
g.addColorStop(0,"#0f2027");
g.addColorStop(1,"#2c5364");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

// VELOCIDAD
let elapsed=(Date.now()-startTime)/1000;
speed=0.8 + Math.floor(elapsed/5)*0.08;

cameraX+=speed*6;

let ground=canvas.height-80;

// FISICA
if(player.mode==="cube"){
player.dy+=player.gravity*gravityDir;

if(holding && player.grounded){
player.dy=player.jump*gravityDir;
}
}else if(player.mode==="ship"){
if(holding){
player.dy-=0.6;
}else{
player.dy+=0.6;
}
}

player.y+=player.dy;

// LIMITES
if(player.y+player.size>=ground){
player.y=ground-player.size;
player.dy=0;
player.grounded=true;
}else if(player.y<=0){
player.y=0;
player.dy=0;
}else{
player.grounded=false;
}

// TRAIL PRO
ctx.fillStyle="rgba(0,255,255,0.15)";
ctx.fillRect(player.x-15,player.y-15,player.size,player.size);

// PLAYER
if(alive){
ctx.save();
ctx.translate(player.x,player.y);
ctx.rotate(player.rotation);

ctx.shadowBlur=30;
ctx.shadowColor="#00ffff";
ctx.fillStyle="#00ffff";
ctx.fillRect(-player.size/2,-player.size/2,player.size,player.size);

ctx.restore();
}

// OBSTACULOS
level.forEach(obs=>{
let x=obs.x-cameraX;
let y=ground-obs.h;

ctx.fillStyle="#ff0066";
ctx.shadowBlur=25;
ctx.shadowColor="#ff0066";

ctx.beginPath();
ctx.moveTo(x,ground);
ctx.lineTo(x+40,y);
ctx.lineTo(x+80,ground);
ctx.fill();

// HITBOX
if(alive &&
player.x < x+70 &&
player.x+player.size > x+10 &&
player.y < ground &&
player.y+player.size > y
){
alive=false;
explode(player.x,player.y);
setTimeout(()=>{document.getElementById("retry").style.display="block";},300);
}
});

// PORTALES PRO
portals.forEach(p=>{
let x=p.x-cameraX;

ctx.shadowBlur=40;
ctx.strokeStyle=
p.type==="gravity"?"yellow":
p.type==="ship"?"lime":"cyan";

ctx.beginPath();
ctx.arc(x,canvas.height/2,35,0,Math.PI*2);
ctx.stroke();

// PARTICULAS PORTAL
if(Math.random()<0.3){
particles.push({
x:x,y:canvas.height/2,
dx:(Math.random()-0.5)*3,
dy:(Math.random()-0.5)*3,
life:20
});
}

// ACTIVACION
if(player.x<x+35 && player.x+player.size>x-35){
if(p.type==="gravity") gravityDir*=-1;
if(p.type==="ship") player.mode="ship";
if(p.type==="cube") player.mode="cube";
}
});

// PARTICULAS
particles.forEach((p,i)=>{
p.x+=p.dx;
p.y+=p.dy;
p.life--;

ctx.fillStyle="cyan";
ctx.fillRect(p.x,p.y,4,4);

if(p.life<=0) particles.splice(i,1);
});

// UI
ctx.fillStyle="white";
ctx.fillText("Speed: "+speed.toFixed(1),20,40);

requestAnimationFrame(game);
}

// EXPLOSION
function explode(x,y){
for(let i=0;i<50;i++){
particles.push({
x,y,
dx:(Math.random()-0.5)*8,
dy:(Math.random()-0.5)*8,
life:40
});
}
}

// REINICIAR
function restart(){
document.getElementById("retry").style.display="none";
startGame();
}

// PAUSA
function togglePause(){
paused=!paused;
document.getElementById("pauseBtn").innerText=paused?"▶":"⏸";
}
</script>

</body>
</html>

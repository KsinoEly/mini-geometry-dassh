<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Geometry Dash</title>

<style>
body{margin:0;background:black;overflow:hidden;font-family:Arial;}
canvas{display:block;}

#menu{
position:absolute;width:100%;text-align:center;top:40px;color:white;
}

button{
padding:10px;margin:5px;border:none;border-radius:8px;font-size:16px;
}

#pauseBtn{
position:fixed;top:10px;right:10px;
padding:6px 10px;font-size:14px;opacity:0.7;
}

#retry{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
display:none;font-size:20px;
}
</style>
</head>

<body>

<div id="menu">
<h1>Mini Geometry Dash</h1>
<button onclick="startGame()">JUGAR</button>
</div>

<button id="pauseBtn" onclick="togglePause()" style="display:none;">⏸</button>
<button id="retry" onclick="restart()">REINTENTAR</button>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);

// VARIABLES
let player,level,portals;
let cameraX,speed,startTime,alive,paused,gravityDir;
let particles=[];

// INICIO
function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
document.getElementById("pauseBtn").style.display="block";

resize();

player={
x:120,y:0,size:50,dy:0,
gravity:0.8,jump:-16,
grounded:false,rotation:0,
mode:"cube"
};

gravityDir=1;
cameraX=0;
speed=1.1;
alive=true;
paused=false;
startTime=Date.now();

level=[
{x:600,h:60},{x:1200,h:80},{x:1800,h:70},
{x:2600,h:100},{x:3400,h:80},{x:4200,h:120}
];

portals=[
{x:1000,type:"gravity"},
{x:2000,type:"fly"},
{x:3000,type:"cube"}
];

particles=[];

game();
}

// INPUT
window.addEventListener("click",jump);
window.addEventListener("keydown",e=>{
if(e.code==="Space") jump();
});

function jump(){
if(!alive||paused) return;

if(player.mode==="cube"){
if(player.grounded){
player.dy=player.jump*gravityDir;
player.grounded=false;
}
}else{
player.dy=-10;
}
}

// PARTICULAS
function spawnTrail(x,y){
particles.push({
x,y,
dx:(Math.random()-0.5)*2,
dy:(Math.random()-0.5)*2,
life:20,
color:"#00ffff"
});
}

function explode(x,y){
for(let i=0;i<40;i++){
particles.push({
x,y,
dx:(Math.random()-0.5)*8,
dy:(Math.random()-0.5)*8,
life:40,
color:"white"
});
}
}

// COLISION
function hit(px,py,ps, ox,oy,ow,oh){
return px<ox+ow && px+ps>ox && py<oy+oh && py+ps>oy;
}

// LOOP
function game(){

if(paused){requestAnimationFrame(game);return;}

// FONDO NEON
let g=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
g.addColorStop(0,"#0f2027");
g.addColorStop(1,"#2c5364");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

// VELOCIDAD
let elapsed=(Date.now()-startTime)/1000;
speed=1.1 + Math.floor(elapsed/10)*0.1;

cameraX+=speed*6;

let ground=canvas.height-80;

// FISICA
if(player.mode==="cube"){
player.dy+=player.gravity*gravityDir;
}else{
player.dy+=0.5;
}

player.y+=player.dy;

// SUELO / TECHO
if(gravityDir===1){
if(player.y+player.size>=ground){
player.y=ground-player.size;
player.dy=0;
player.grounded=true;
player.rotation=0;
}else{
player.rotation+=0.15;
}
}else{
if(player.y<=0){
player.y=0;
player.dy=0;
player.grounded=true;
player.rotation=0;
}else{
player.rotation+=0.15;
}
}

// TRAIL
spawnTrail(player.x,player.y);

// PLAYER
if(alive){
ctx.save();
ctx.translate(player.x,player.y);
ctx.rotate(player.rotation);

ctx.shadowBlur=25;
ctx.shadowColor="#00ffff";
ctx.fillStyle="#00ffff";
ctx.fillRect(-player.size/2,-player.size/2,player.size,player.size);

ctx.restore();
}

// OBSTACULOS
level.forEach(obs=>{
let x=obs.x-cameraX;
let gy=ground-obs.h;

ctx.fillStyle="#ff0066";
ctx.shadowBlur=20;
ctx.shadowColor="#ff0066";

ctx.beginPath();
ctx.moveTo(x,ground);
ctx.lineTo(x+40,gy);
ctx.lineTo(x+80,ground);
ctx.fill();

if(alive && hit(player.x,player.y,player.size,x+10,gy,60,obs.h)){
alive=false;
explode(player.x,player.y);
setTimeout(()=>retry.style.display="block",300);
}
});

// PORTALES
portals.forEach(p=>{
let x=p.x-cameraX;

ctx.shadowBlur=30;
ctx.strokeStyle=
p.type==="gravity"?"yellow":
p.type==="fly"?"lime":"cyan";

ctx.lineWidth=5;
ctx.beginPath();
ctx.arc(x,canvas.height/2,30,0,Math.PI*2);
ctx.stroke();

// ACTIVAR
if(player.x<x+30 && player.x+player.size>x-30){
if(p.type==="gravity") gravityDir*=-1;
if(p.type==="fly") player.mode="fly";
if(p.type==="cube") player.mode="cube";
}
});

// PARTICULAS
particles.forEach((p,i)=>{
p.x+=p.dx;
p.y+=p.dy;
p.life--;

ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,3,3);

if(p.life<=0) particles.splice(i,1);
});

// UI
ctx.fillStyle="white";
ctx.shadowBlur=0;
ctx.fillText("Speed: "+speed.toFixed(1),20,40);

requestAnimationFrame(game);
}

// REINICIAR
function restart(){
retry.style.display="none";
startGame();
}

// PAUSA
function togglePause(){
paused=!paused;
pauseBtn.innerText=paused?"▶":"⏸";
}
</script>

</body>
</html>
